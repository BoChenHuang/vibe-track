services:
  - type: web
    name: vibe-track
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLAUDE_API_KEY
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_MAX
        value: 5
      - key: RATE_LIMIT_WINDOW_SEC
        value: 3600
